databases:
  - name: assetclear-db
    plan: starter
    postgresMajorVersion: 16

services:
  - type: web
    name: assetclear-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run db:generate && npm run db:deploy && npm run build --workspace=apps/api
    startCommand: npm run start --workspace=apps/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assetclear-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CLIENT_ORIGIN
        value: https://REPLACE-WITH-YOUR-NETLIFY-SITE.netlify.app
